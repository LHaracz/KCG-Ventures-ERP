# Run in Shopify Admin GraphQL (API version e.g. 2026-04).
# Shopify caps a single query at cost 1000 — this export uses small page sizes.
# Paginate with $cursor until products.pageInfo.hasNextPage is false.
# If you still hit MAX_COST_EXCEEDED, lower productsFirst / variantsFirst further.
#
# For very large catalogs, use Bulk Operations instead:
# https://shopify.dev/docs/api/usage/bulk-operations/queries

# -----------------------------------------------------------------------------
# Locations (cheap). Numeric part of gid://shopify/Location/... = shopify_location_id
# -----------------------------------------------------------------------------
query ListLocations {
  locations(first: 10) {
    edges {
      node {
        id
        name
        isActive
        isPrimary
      }
    }
  }
}

# -----------------------------------------------------------------------------
# Paginated catalog (tuned under typical 1000 cost cap)
# Variables example: { "cursor": null } or { "cursor": null, "productsFirst": 5, "variantsFirst": 10 }
# -----------------------------------------------------------------------------
query ExportVariantInventoryMappings(
  $cursor: String
  $productsFirst: Int = 8
  $variantsFirst: Int = 15
) {
  products(first: $productsFirst, after: $cursor) {
    pageInfo {
      hasNextPage
      endCursor
    }
    edges {
      node {
        id
        title
        variants(first: $variantsFirst) {
          edges {
            node {
              id
              title
              sku
              inventoryItem {
                id
                tracked
                inventoryLevels(first: 5) {
                  edges {
                    node {
                      quantities(names: ["available"]) {
                        quantity
                      }
                      location {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}

# First page (defaults):
# { "cursor": null }
#
# If cost still too high:
# { "cursor": null, "productsFirst": 5, "variantsFirst": 10 }
#
# Next page:
# { "cursor": "<products.pageInfo.endCursor>" }
